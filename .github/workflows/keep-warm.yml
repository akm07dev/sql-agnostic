name: Keep Warm
on:
  schedule:
    - cron: '0 0 * * *' # Once a day at midnight to keep Supabase active
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Public Feedback Endpoint
        run: |
          # Replace the URL below with your actual Vercel Production URL after deployment
          curl -s -f https://sql-agnostic.akm07.dev/api/public/feedback || echo "Ping failed, check URL"
