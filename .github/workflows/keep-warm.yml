name: Keep Warm
on:
  schedule:
    - cron: '*/14 * * * *' # Every 14 minutes
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          # Replace the URL below with your actual Vercel Production URL after deployment
          curl -s -f https://sql-agnostic.vercel.app/api/health || echo "Ping failed, check URL"
